name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: docker build -t spark-1traffic-app .

      - name: Push to Registry
        run: |
          docker tag spark-1traffic-app ${{ secrets.DOCKERHUB_USERNAME }}/spark-1traffic-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spark-1traffic-app:latest
