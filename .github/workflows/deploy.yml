name: CI/CD Pipeline
on:
  push:
    branches: [ main ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker Image
        run: docker build -t spark-traffic-app .
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Push to Registry
        run: |
          docker tag spark-traffic-app ${{ secrets.DOCKERHUB_USERNAME }}/spark-traffic-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spark-traffic-app:latest